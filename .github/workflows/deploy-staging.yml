name: deploy-staging

# Автодеплой на staging при обновлении main (мердж PR).
# Прод (pdf.runpro.in) НЕ затрагивается — отдельный сервис/порт/каталог.
on:
  push:
    branches: [main]
  workflow_dispatch: {}        # можно запустить вручную из вкладки Actions

concurrency:
  group: staging-deploy
  cancel-in-progress: true     # если набежало несколько мерджей — деплоим только последний

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to pdf-staging.runpro.in over SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            "cd /opt/pdf-editor-staging && git fetch --quiet origin main && git reset --hard origin/main && /bin/bash deploy/staging-deploy.sh"

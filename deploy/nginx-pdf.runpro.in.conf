# Новый отдельный server-блок для поддомена pdf.runpro.in.
# Кладётся в /etc/nginx/sites-available/pdf.runpro.in и симлинкуется в sites-enabled.
# НЕ редактировать существующий блок runpro.in!
#
# Это HTTP-вариант. После `certbot --nginx -d pdf.runpro.in` Certbot сам допишет
# 443-блок с SSL и редирект с 80 на 443.

server {
    listen 80;
    server_name pdf.runpro.in;

    # Загрузка PDF до 50 МБ + запас на multipart-обёртку
    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
